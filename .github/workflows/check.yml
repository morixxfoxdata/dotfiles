name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Validate flake
        run: nix flake check --all-systems

      - name: Evaluate home configuration (gpu-server)
        run: nix eval .#homeConfigurations.gpu-server.activationPackage
